<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>benelabs</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Symmetrisches, flüssiges Pulsieren der Vektor-Ringe */
        @keyframes svg-pulse {
            0% { 
                transform: scale(1); 
                opacity: 0.8; 
            }
            80% {
                opacity: 0.15;
            }
            100% { 
                transform: scale(2.6); 
                opacity: 0; 
            }
        }
        
        .pulse-ring-1 {
            animation: svg-pulse 2.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
            transform-origin: center;
        }
        
        .pulse-ring-2 {
            animation: svg-pulse 2.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) infinite;
            animation-delay: 0.7s;
            transform-origin: center;
        }
    </style>
</head>
<body class="bg-[#f2f2f7] text-zinc-950 m-0 p-0 font-sans antialiased overflow-hidden h-[100dvh] w-full selection:bg-blue-100">

    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const generatePlaceholderBars = (count) => {
            return Array.from({ length: count }, (_, i) => ({ id: i }));
        };

        function App() {
            const [screen, setScreen] = useState('status'); // 'status' | 'login'
            const [bisou, setBisou] = useState({ status: 'loading', uptime: null });
            const [wetter, setWetter] = useState({ status: 'loading', uptime: null });

            useEffect(() => {
                const fetchStatus = () => {
                    fetch('https://api.uptimerobot.com/v2/getMonitors', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            api_key: 'ur3562417-87173ffaa78e368a74d99e34',
                            format: 'json',
                            custom_uptime_ratios: '1'
                        })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.monitors && data.monitors.length > 0) {
                            const bisouMonitor = data.monitors.find(m => 
                                m.friendly_name.toLowerCase().includes('bisou') || 
                                m.url.toLowerCase().includes('bisou')
                            );

                            const wetterMonitor = data.monitors.find(m => 
                                m.friendly_name.toLowerCase().includes('wetter') || 
                                m.friendly_name.toLowerCase().includes('bene') ||
                                m.url.toLowerCase().includes('wetter')
                            );

                            const finalBisou = bisouMonitor || data.monitors[0];
                            const finalWetter = wetterMonitor || (data.monitors.length > 1 ? data.monitors[1] : null);

                            setBisou({
                                status: 'online',
                                uptime: finalBisou.custom_uptime_ratio || null
                            });

                            if (finalWetter) {
                                setWetter({
                                    status: 'online',
                                    uptime: finalWetter.custom_uptime_ratio || null
                                });
                            } else {
                                setWetter({ status: 'online', uptime: null });
                            }
                        } else {
                            setBisou({ status: 'online', uptime: null });
                            setWetter({ status: 'online', uptime: null });
                        }
                    })
                    .catch(() => {
                        setBisou({ status: 'online', uptime: null });
                        setWetter({ status: 'online', uptime: null });
                    });
                };

                fetchStatus();
                const interval = setInterval(fetchStatus, 60000);
                return () => clearInterval(interval);
            }, []);

            return (
                <div className="h-[100dvh] flex flex-col justify-between p-6 sm:p-10 max-w-2xl mx-auto w-full box-border">
                    
                    <header className="flex justify-between items-center border-b border-zinc-200/80 pb-4 w-full h-12 shrink-0">
                        <div className="flex items-center gap-2.5">
                            <span className="text-xl font-extrabold tracking-tight text-zinc-900 font-sans">
                                benelabs
                            </span>
                        </div>
                        
                        <button 
                            onClick={() => setScreen(screen === 'status' ? 'login' : 'status')}
                            className={`text-xs font-semibold px-4 py-1.5 rounded-lg border transition-all ${
                                screen === 'status' 
                                ? 'bg-white text-zinc-700 border-zinc-200 hover:border-zinc-400 hover:text-zinc-900 shadow-sm' 
                                : 'bg-zinc-950 text-white border-zinc-950 hover:bg-zinc-800'
                            }`}
                        >
                            {screen === 'status' ? 'Anmelden' : 'Schließen'}
                        </button>
                    </header>

                    <main className="flex-1 flex flex-col justify-center overflow-hidden w-full py-8">
                        
                        {screen === 'status' ? (
                            /* --- DASHBOARD VIEW --- */
                            <div className="space-y-10 w-full">
                                <div>
                                    <h1 className="text-lg font-bold tracking-tight text-zinc-900">
                                        Systemstatus
                                    </h1>
                                </div>

                                <div className="space-y-10 divide-y divide-zinc-200/80">
                                    
                                    <div className="pt-0 flex flex-col gap-3.5">
                                        <div className="flex items-center justify-between gap-4">
                                            <div className="space-y-0.5">
                                                <h2 className="text-base font-extrabold text-[#A199FE] font-sans">Bisou-App</h2>
                                                <div className="text-[10px] text-zinc-400 font-mono">bisou.benelabs.de</div>
                                            </div>
                                            
                                            <div className="flex items-center gap-4 shrink-0">
                                                
                                                <div className="inline-flex items-center h-6 w-auto px-2.5 gap-1.5 rounded-md bg-[#A199FE]/5 border border-[#A199FE]/20 select-none pointer-events-none">
                                                    {bisou.status === 'loading' ? (
                                                        <>
                                                            <svg className="animate-spin h-3 w-3 text-zinc-400 shrink-0 block my-auto" fill="none" viewBox="0 0 24 24" style={{ display: 'block', verticalAlign: 'middle' }}>
                                                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                            </svg>
                                                            <span className="text-[10px] font-bold font-mono text-zinc-400 tracking-wide mt-[1px]">PRÜFE...</span>
                                                        </>
                                                    ) : (
                                                        <>
                                                            <svg className="w-3 h-3 shrink-0 overflow-visible block my-auto" viewBox="0 0 16 16" style={{ display: 'block', verticalAlign: 'middle' }}>
                                                                <circle className="pulse-ring-2" cx="50%" cy="50%" r="3" fill="#7DE3B5" />
                                                                <circle className="pulse-ring-1" cx="50%" cy="50%" r="3" fill="#7DE3B5" />
                                                                <circle cx="50%" cy="50%" r="3" fill="#55D49C" />
                                                            </svg>
                                                            <span className="text-[10px] font-bold font-mono text-[#55D49C] tracking-wide mt-[1px]">ONLINE</span>
                                                        </>
                                                    )}
                                                </div>

                                                <a 
                                                    href="https://bisou.benelabs.de" 
                                                    target="_blank" 
                                                    rel="noopener noreferrer"
                                                    className="text-xs font-semibold font-mono border px-3 py-1 rounded-lg transition-all border-[#A199FE]/40 text-[#A199FE] bg-[#A199FE]/5 hover:bg-[#A199FE] hover:text-white whitespace-nowrap shadow-sm"
                                                >
                                                    zu Bisou ↗
                                                </a>
                                            </div>
                                        </div>

                                        {/* 24h-Balken Bisou */}
                                        <div className="space-y-1">
                                            <div className="flex justify-between text-[10px] font-mono text-zinc-400">
                                                <span>Letzte 24 Stunden</span>
                                                <span className="font-bold text-[#55D49C]">{bisou.uptime ? `${bisou.uptime}%` : '100.0%'}</span>
                                            </div>
                                            <div className="flex gap-[3px] h-2 items-center">
                                                {generatePlaceholderBars(24).map((bar) => (
                                                    <div 
                                                        key={bar.id} 
                                                        className={`h-full flex-1 rounded-[1px] transition-colors ${
                                                            bisou.status === 'loading' ? 'bg-zinc-200' : 'bg-[#55D49C]'
                                                        }`}
                                                    />
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="pt-6 flex flex-col gap-3.5">
                                        <div className="flex items-center justify-between gap-4">
                                            <div className="space-y-0.5">
                                                <h2 className="text-base font-extrabold text-sky-500 font-sans">BeneWetter</h2>
                                                <div className="text-[10px] text-zinc-400 font-mono">wetter.benelabs.de</div>
                                            </div>
                                            
                                            <div className="flex items-center gap-4 shrink-0">
                                                
                                                <div className="inline-flex items-center h-6 w-auto px-2.5 gap-1.5 rounded-md bg-sky-500/5 border border-sky-500/20 select-none pointer-events-none">
                                                    {wetter.status === 'loading' ? (
                                                        <>
                                                            <svg className="animate-spin h-3 w-3 text-zinc-400 shrink-0 block my-auto" fill="none" viewBox="0 0 24 24" style={{ display: 'block', verticalAlign: 'middle' }}>
                                                                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle>
                                                                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                                                            </svg>
                                                            <span className="text-[10px] font-bold font-mono text-zinc-400 tracking-wide mt-[1px]">PRÜFE...</span>
                                                        </>
                                                    ) : (
                                                        <>
                                                            <svg className="w-3 h-3 shrink-0 overflow-visible block my-auto" viewBox="0 0 16 16" style={{ display: 'block', verticalAlign: 'middle' }}>
                                                                <circle className="pulse-ring-2" cx="50%" cy="50%" r="3" fill="#7DE3B5" />
                                                                <circle className="pulse-ring-1" cx="50%" cy="50%" r="3" fill="#7DE3B5" />
                                                                <circle cx="50%" cy="50%" r="3" fill="#55D49C" />
                                                            </svg>
                                                            <span className="text-[10px] font-bold font-mono text-[#55D49C] tracking-wide mt-[1px]">ONLINE</span>
                                                        </>
                                                    )}
                                                </div>

                                                <a 
                                                    href="https://wetter.benelabs.de" 
                                                    target="_blank" 
                                                    rel="noopener noreferrer"
                                                    className="text-xs font-semibold font-mono border px-3 py-1 rounded-lg transition-all border-sky-400/40 text-sky-600 bg-sky-500/5 hover:bg-sky-500 hover:text-white whitespace-nowrap shadow-sm"
                                                >
                                                    zu BeneWetter ↗
                                                </a>
                                            </div>
                                        </div>

                                        {/* 24h-Balken BeneWetter */}
                                        <div className="space-y-1">
                                            <div className="flex justify-between text-[10px] font-mono text-zinc-400">
                                                <span>Letzte 24 Stunden</span>
                                                <span className="font-bold text-[#55D49C]">{wetter.uptime ? `${wetter.uptime}%` : '100.0%'}</span>
                                            </div>
                                            <div className="flex gap-[3px] h-2 items-center">
                                                {generatePlaceholderBars(24).map((bar) => (
                                                    <div 
                                                        key={bar.id} 
                                                        className={`h-full flex-1 rounded-[1px] transition-colors ${
                                                            wetter.status === 'loading' ? 'bg-zinc-200' : 'bg-[#55D49C]'
                                                        }`}
                                                    />
                                                ))}
                                            </div>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        ) : (
                            /* --- LOGIN MASKE --- */
                            <div className="max-w-sm mx-auto w-full border border-zinc-200 bg-white p-6 sm:p-8 rounded-xl shadow-sm relative">
                                <div className="absolute top-0 left-0 right-0 h-1 bg-zinc-900 rounded-t-xl"></div>
                                <div className="mb-5">
                                    <h2 className="text-lg font-bold tracking-tight text-zinc-900">Identität bestätigen</h2>
                                    <p className="text-[11px] text-zinc-400 font-mono">Autorisierter Zugriff auf persönliche Profileinstellungen.</p>
                                </div>

                                <form onSubmit={(e) => e.preventDefault()} className="space-y-4">
                                    <div>
                                        <label className="block text-[10px] font-mono font-bold uppercase tracking-wider text-zinc-400 mb-1">E-Mail</label>
                                        <input 
                                            type="email" required placeholder="name@domain.de"
                                            className="w-full px-3 py-2 text-xs font-mono rounded-lg border border-zinc-300 bg-zinc-50 focus:outline-none focus:border-zinc-500 focus:bg-white transition-all"
                                        />
                                    </div>

                                    <div className="relative">
                                        <label className="block text-[10px] font-mono font-bold uppercase tracking-wider text-zinc-400 mb-1">Passwort</label>
                                        <input 
                                            type="password" required placeholder="••••••••"
                                            className="w-full px-3 py-2 text-xs font-mono rounded-lg border border-zinc-300 bg-zinc-50 focus:outline-none focus:border-zinc-500 focus:bg-white transition-all"
                                        />
                                    </div>

                                    <button 
                                        type="submit"
                                        className="w-full py-2 rounded-lg bg-zinc-950 hover:bg-zinc-800 text-white text-xs font-mono font-semibold tracking-wider transition-colors shadow-sm"
                                    >
                                        Verifizieren
                                    </button>
                                </form>
                            </div>
                        )}
                        
                    </main>

                    <footer className="w-full text-center text-[10px] text-zinc-400 font-mono tracking-widest pt-4 border-t border-zinc-300/60 h-8 shrink-0">
                        © {new Date().getFullYear()} benelabs
                    </footer>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
