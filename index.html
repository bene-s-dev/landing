<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>benelabs Status</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#f8f9fa] text-zinc-900 m-0 p-0 font-sans antialiased selection:bg-blue-100">

    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [screen, setScreen] = useState('status'); // 'status' | 'login'
            
            // Login States
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [loginSuccess, setLoginSuccess] = useState(false);

            // API States für Bisou
            const [bisou, setBisou] = useState({ status: 'loading', uptime: null });

            // Fetch UptimeRobot Daten für Bisou
            useEffect(() => {
                const fetchStatus = () => {
                    fetch('https://api.uptimerobot.com/v2/getMonitors', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            api_key: 'ur3562417-87173ffaa78e368a74d99e34',
                            format: 'json',
                            custom_uptime_ratios: '1' // Holt die 24h/Custom-Verfügbarkeit mit
                        })
                    })
                    .then(res => res.json())
                    .then(data => {
                        if (data && data.monitors && data.monitors.length > 0) {
                            // Wir nehmen den Monitor, der zu Bisou passt
                            const monitor = data.monitors.find(m => 
                                m.friendly_name.toLowerCase().includes('bisou') || 
                                m.url.toLowerCase().includes('bisou')
                            ) || data.monitors[0];

                            setBisou({
                                status: monitor.status === 2 ? 'online' : 'offline',
                                uptime: monitor.custom_uptime_ratio || null
                            });
                        } else {
                            setBisou({ status: 'error', uptime: null });
                        }
                    })
                    .catch(() => {
                        setBisou({ status: 'error', uptime: null });
                    });
                };

                fetchStatus();
                const interval = setInterval(fetchStatus, 60000); // Jede Minute aktualisieren
                return () => clearInterval(interval);
            }, []);

            const handleLoginSubmit = (e) => {
                e.preventDefault();
                if (!email || !password) return;
                setIsSubmitting(true);
                
                setTimeout(() => {
                    setIsSubmitting(false);
                    setLoginSuccess(true);
                    setTimeout(() => {
                        setLoginSuccess(false);
                        setScreen('status');
                        setEmail('');
                        setPassword('');
                    }, 1500);
                }, 1200);
            };

            return (
                <div className="min-h-screen flex flex-col justify-between p-6 sm:p-12 max-w-4xl mx-auto w-full">
                    
                    <header className="flex justify-between items-center border-b border-zinc-200 pb-6 w-full">
                        <div className="flex items-center gap-3">
                            <span className="text-lg font-bold tracking-tight text-zinc-900">benelabs</span>
                            <span className="px-2 py-0.5 text-[10px] font-mono bg-zinc-200/60 text-zinc-600 rounded">STATUS</span>
                        </div>
                        
                        {screen === 'status' ? (
                            <button 
                                onClick={() => setScreen('login')}
                                className="text-xs font-semibold text-zinc-600 hover:text-zinc-900 border border-zinc-300 hover:border-zinc-400 bg-white px-4 py-2 rounded-lg shadow-sm transition-all"
                            >
                                Anmelden
                            </button>
                        ) : (
                            <button 
                                onClick={() => setScreen('status')}
                                className="text-xs font-semibold text-zinc-500 hover:text-zinc-800 transition-colors flex items-center gap-1"
                            >
                                ← Zurück zur Statusseite
                            </button>
                        )}
                    </header>

                    <main className="flex-1 flex flex-col justify-center py-12 w-full">
                        
                        {screen === 'status' ? (
                            /* --- KLASSISCHE STATUS SEITE --- */
                            <div className="space-y-8 w-full">
                                <div className="space-y-2">
                                    <h1 className="text-2xl font-bold tracking-tight text-zinc-900">Aktueller Systemstatus</h1>
                                    <p className="text-sm text-zinc-500">Hier findest du den Live-Status aller öffentlich erreichbaren Anwendungen von benelabs.</p>
                                </div>

                                <div className="divide-y divide-zinc-200 border-t border-b border-zinc-200">
                                    
                                    {/* APP 1: BISOU (Mit echten API-Daten) */}
                                    <div className="py-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                        <div>
                                            <div className="flex items-center gap-2">
                                                <a href="https://bisou.benelabs.de" target="_blank" rel="noopener noreferrer" className="font-semibold text-zinc-900 hover:underline">
                                                    Bisou App
                                                </a>
                                                <span className="text-xs text-zinc-400 font-mono">bisou.benelabs.de</span>
                                            </div>
                                            <p className="text-xs text-zinc-400 mt-0.5">
                                                Uptime (24h): {bisou.uptime ? `${bisou.uptime}%` : 'Verfügbar'}
                                            </p>
                                        </div>
                                        <div className="flex items-center">
                                            {bisou.status === 'loading' && (
                                                <span className="text-xs text-zinc-400 animate-pulse">Prüfe Status...</span>
                                            )}
                                            {bisou.status === 'online' && (
                                                <span className="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-emerald-50 text-emerald-700 border border-emerald-200/60">
                                                    <span className="h-2 w-2 rounded-full bg-emerald-500"></span>
                                                    Betriebsbereit
                                                </span>
                                            )}
                                            {bisou.status === 'offline' && (
                                                <span className="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-semibold bg-rose-50 text-rose-700 border border-rose-200/60">
                                                    <span className="h-2 w-2 rounded-full bg-rose-500"></span>
                                                    Störung
                                                </span>
                                            )}
                                            {bisou.status === 'error' && (
                                                <span className="text-xs font-semibold text-amber-700 bg-amber-50 px-3 py-1 rounded-full border border-amber-200/60">Verbindung fehlgeschlagen</span>
                                            )}
                                        </div>
                                    </div>

                                    {/* APP 2: BENEWETTER (Keine API vorhanden -> Platzhalter) */}
                                    <div className="py-5 flex flex-col sm:flex-row sm:items-center justify-between gap-4">
                                        <div>
                                            <div className="flex items-center gap-2">
                                                <a href="https://wetter.benelabs.de" target="_blank" rel="noopener noreferrer" className="font-semibold text-zinc-900 hover:underline">
                                                    BeneWetter
                                                </a>
                                                <span className="text-xs text-zinc-400 font-mono">wetter.benelabs.de</span>
                                            </div>
                                            <p className="text-xs text-zinc-400 mt-0.5">Keine API-Daten hinterlegt</p>
                                        </div>
                                        <div>
                                            <span className="inline-flex items-center px-3 py-1 rounded-full text-xs font-medium bg-zinc-100 text-zinc-500 border border-zinc-200">
                                                Keine Daten verfügbar
                                            </span>
                                        </div>
                                    </div>

                                </div>
                            </div>
                        ) : (
                            /* --- SCHLICHTE LOGIN MASKE --- */
                            <div className="max-w-md mx-auto w-full border border-zinc-200 bg-white p-8 rounded-xl shadow-sm">
                                <h2 className="text-xl font-bold tracking-tight text-zinc-900 mb-1">Anmelden</h2>
                                <p className="text-xs text-zinc-400 font-medium mb-6">Zugang zu privaten Diensten und Homelabverwaltung.</p>

                                {loginSuccess ? (
                                    <div className="py-6 text-center space-y-2">
                                        <div className="inline-flex h-8 w-8 items-center justify-center rounded-full bg-emerald-50 text-emerald-600 border border-emerald-100 font-bold text-sm">✓</div>
                                        <p className="text-xs font-semibold text-zinc-800">Erfolgreich angemeldet</p>
                                    </div>
                                ) : (
                                    <form onSubmit={handleLoginSubmit} className="space-y-4">
                                        <div>
                                            <label className="block text-[10px] font-bold uppercase tracking-wider text-zinc-400 mb-1">E-Mail-Adresse</label>
                                            <input 
                                                type="email" required disabled={isSubmitting} value={email}
                                                onChange={(e) => setEmail(e.target.value)} placeholder="name@beispiel.de"
                                                className="w-full px-3.5 py-2 text-xs rounded-lg border border-zinc-300 bg-zinc-50 focus:outline-none focus:border-zinc-400 focus:bg-white transition-all"
                                            />
                                        </div>

                                        <div className="relative">
                                            <label className="block text-[10px] font-bold uppercase tracking-wider text-zinc-400 mb-1">Passwort</label>
                                            <div className="relative">
                                                <input 
                                                    type={showPassword ? "text" : "password"} required disabled={isSubmitting} value={password}
                                                    onChange={(e) => setPassword(e.target.value)} placeholder="••••••••"
                                                    className="w-full pl-3.5 pr-10 py-2 text-xs rounded-lg border border-zinc-300 bg-zinc-50 focus:outline-none focus:border-zinc-400 focus:bg-white transition-all"
                                                />
                                                <button
                                                    type="button" onClick={() => setShowPassword(!showPassword)}
                                                    className="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-zinc-600 text-xs"
                                                >
                                                    {showPassword ? "Verbergen" : "Zeigen"}
                                                </button>
                                            </div>
                                        </div>

                                        <button 
                                            type="submit" disabled={isSubmitting}
                                            className="w-full py-2 rounded-lg bg-zinc-900 hover:bg-zinc-800 text-white text-xs font-semibold disabled:opacity-50 transition-colors"
                                        >
                                            {isSubmitting ? 'Verbinden...' : 'Anmelden'}
                                        </button>
                                    </form>
                                )}
                            </div>
                        )}
                        
                    </main>

                    <footer className="w-full text-center text-[10px] text-zinc-400 font-mono tracking-wider pt-6 border-t border-zinc-200/60">
                        © {new Date().getFullYear()} benelabs — Alle Systeme werden kontinuierlich überwacht.
                    </footer>
                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
