<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>benelabs</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel CDNs für direktes Ausführen im Browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Sanfte Keyframe-Animationen */
        @keyframes float-slow {
            0%, 100% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-15px) scale(1.03); }
        }
        @keyframes float-reverse {
            0%, 100% { transform: translateY(0px) scale(1.03); }
            50% { transform: translateY(15px) scale(0.97); }
        }
        @keyframes pulse-ring {
            0% { transform: scale(0.7); opacity: 0.8; }
            100% { transform: scale(1.6); opacity: 0; }
        }
        .animate-float-1 {
            animation: float-slow 14s ease-in-out infinite;
        }
        .animate-float-2 {
            animation: float-reverse 18s ease-in-out infinite;
        }
        .animate-pulse-ring {
            animation: pulse-ring 2s cubic-bezier(0.215, 0.610, 0.355, 1) infinite;
        }
    </style>
</head>
<body class="bg-[#f6f6f3] text-zinc-900 m-0 p-0 font-sans antialiased overflow-hidden selection:bg-blue-100">

    <!-- React Root-Mountpoint -->
    <div id="root"></div>

    <!-- React App Implementation -->
    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        function App() {
            const [coords, setCoords] = useState({ x: 0, y: 0 });
            const [screen, setScreen] = useState('home'); // 'home' | 'login'
            const [visibleScreen, setVisibleScreen] = useState('home');
            const [contentOpacity, setContentOpacity] = useState(1);
            const [cardHeight, setCardHeight] = useState(0);

            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [loginSuccess, setLoginSuccess] = useState(false);

            const cardRef = useRef(null);
            const innerContentRef = useRef(null);

            // Sanfte Interaktion mit den Hintergrund-Lichtquellen bei Mausbewegung
            const handleMouseMove = (e) => {
                const { clientX, clientY } = e;
                setCoords({ x: clientX, y: clientY });
            };

            // Misst die Höhe des inneren Inhalts dynamisch für einen butterweichen Übergang
            useEffect(() => {
                if (innerContentRef.current) {
                    const handleResize = () => {
                        setCardHeight(innerContentRef.current.offsetHeight);
                    };
                    
                    const timeoutId = setTimeout(handleResize, 50);

                    window.addEventListener('resize', handleResize);
                    return () => {
                        window.removeEventListener('resize', handleResize);
                        clearTimeout(timeoutId);
                    };
                }
            }, [visibleScreen, loginSuccess]);

            // Funktion für den nahtlosen Übergang zwischen den Screens (Fade out -> Switch -> Fade in)
            const navigateTo = (targetScreen) => {
                setContentOpacity(0);
                setTimeout(() => {
                    setScreen(targetScreen);
                    setVisibleScreen(targetScreen);
                    setContentOpacity(1);
                }, 250);
            };

            const handleLoginSubmit = (e) => {
                e.preventDefault();
                if (!email || !password) return;
                
                setIsSubmitting(true);
                setTimeout(() => {
                    setIsSubmitting(false);
                    setLoginSuccess(true);
                    setTimeout(() => {
                        setLoginSuccess(false);
                        navigateTo('home');
                        setEmail('');
                        setPassword('');
                    }, 1500);
                }, 1200);
            };

            return (
                <div 
                    onMouseMove={handleMouseMove}
                    className="relative h-[100dvh] w-full flex flex-col justify-between p-6 sm:p-12 md:p-16 overflow-hidden select-none"
                >
                    {/* Weiche, organische Licht-Aura im Hintergrund */}
                    <div 
                        className="absolute top-1/4 left-1/4 w-[380px] h-[380px] rounded-full bg-blue-400/10 blur-[110px] pointer-events-none animate-float-1 transition-transform duration-1000 ease-out"
                        style={{
                            transform: `translate(${coords.x * 0.02}px, ${coords.y * 0.02}px)`
                        }}
                    />
                    <div 
                        className="absolute bottom-1/4 right-1/4 w-[320px] h-[320px] rounded-full bg-cyan-400/10 blur-[90px] pointer-events-none animate-float-2 transition-transform duration-1000 ease-out"
                        style={{
                            transform: `translate(${coords.x * -0.015}px, ${coords.y * -0.015}px)`
                        }}
                    />

                    {/* Top Header */}
                    <header className="w-full relative z-10">
                        <span className="text-xs tracking-wider text-zinc-400 font-medium font-mono">
                            benelabs.de
                        </span>
                    </header>

                    {/* Center: Karton-Karte mit physischem 3D-Effekt und Höhen-Animation */}
                    <main className="w-full max-w-sm my-auto relative z-10">
                        <div 
                            ref={cardRef}
                            style={{ height: cardHeight ? `${cardHeight}px` : 'auto' }}
                            className="relative w-full rounded-2xl border border-zinc-200/80 bg-[#fdfdfd] shadow-[0_4px_0_0_#e4e4db,0_12px_24px_-8px_rgba(0,0,0,0.06)] transition-[height,transform,shadow] duration-500 ease-in-out overflow-hidden hover:translate-y-[-1px] hover:shadow-[0_5px_0_0_#e4e4db,0_14px_28px_-8px_rgba(0,0,0,0.08)]"
                        >
                            {/* Subtiler Lichtreflex am oberen Rand */}
                            <div className="absolute top-0 left-0 right-0 h-[1px] bg-gradient-to-r from-transparent via-white/45 to-transparent z-20 pointer-events-none" />
                            
                            <div 
                                ref={innerContentRef} 
                                style={{ opacity: contentOpacity }}
                                className="p-6 sm:p-8 transition-opacity duration-250 ease-in-out"
                            >
                                {visibleScreen === 'home' ? (
                                    /* --- STARTSEITE --- */
                                    <div>
                                        <h1 className="text-4xl sm:text-5xl font-extrabold tracking-tight text-zinc-900 mb-3 bg-gradient-to-br from-zinc-900 to-zinc-600 bg-clip-text text-transparent">
                                            benelabs
                                        </h1>
                                        
                                        <p className="text-sm text-zinc-500 font-medium leading-relaxed mb-6">
                                            Digitale Dienste für ein privates Umfeld.
                                        </p>
                                        
                                        <div className="flex flex-col items-start gap-3.5 pt-1.5 pb-2">
                                            {/* Button 1: Anmelden */}
                                            <button 
                                                onClick={() => navigateTo('login')}
                                                className="relative inline-flex items-center gap-4 px-5 py-2.5 rounded-xl bg-blue-600 text-white text-xs font-semibold shadow-[0_2px_0_0_#1d4ed8] hover:translate-y-[0.5px] hover:shadow-[0_1.5px_0_0_#1d4ed8] active:translate-y-[2px] active:shadow-none transition-all duration-100 group"
                                            >
                                                <span className="absolute inset-x-0 top-0 h-[1px] bg-white/25 pointer-events-none" />
                                                <span className="relative z-10">Anmelden</span>
                                                <svg className="relative z-10 h-4 w-4 text-blue-200 group-hover:text-white transition-colors" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
                                            </button>

                                            {/* Button 2: zu Bisou */}
                                            <a 
                                                href="https://bisou.benelabs.de" 
                                                target="_blank" 
                                                rel="noopener noreferrer"
                                                className="relative inline-flex items-center gap-4 px-5 py-2.5 rounded-xl bg-[#b5a2e3] text-white text-xs font-semibold shadow-[0_2px_0_0_#9a87cd] hover:translate-y-[0.5px] hover:shadow-[0_1.5px_0_0_#9a87cd] active:translate-y-[2px] active:shadow-none transition-all duration-100 group"
                                            >
                                                <span className="absolute inset-x-0 top-0 h-[1px] bg-white/35 pointer-events-none" />
                                                <span className="relative z-10">zu Bisou</span>
                                                <svg className="relative z-10 h-4 w-4 text-[#e6dffd] group-hover:text-white transition-colors" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
                                            </a>

                                            {/* Button 3: zu BeneWetter */}
                                            <a 
                                                href="https://wetter.benelabs.de" 
                                                target="_blank" 
                                                rel="noopener noreferrer"
                                                className="relative inline-flex items-center gap-4 px-5 py-2.5 rounded-xl bg-sky-500 text-white text-xs font-semibold shadow-[0_2px_0_0_#0284c7] hover:translate-y-[0.5px] hover:shadow-[0_1.5px_0_0_#0284c7] active:translate-y-[2px] active:shadow-none transition-all duration-100 group"
                                            >
                                                <span className="absolute inset-x-0 top-0 h-[1px] bg-white/35 pointer-events-none" />
                                                <span className="relative z-10">zu BeneWetter</span>
                                                <svg className="relative z-10 h-4 w-4 text-sky-200 group-hover:text-white transition-colors" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="7" y1="17" x2="17" y2="7"></line><polyline points="7 7 17 7 17 17"></polyline></svg>
                                            </a>
                                        </div>
                                    </div>
                                ) : (
                                    /* --- LOGIN MASKE --- */
                                    <div>
                                        <button 
                                            onClick={() => navigateTo('home')}
                                            className="inline-flex items-center gap-1.5 text-xs text-zinc-400 hover:text-zinc-600 font-medium mb-6 transition-colors group"
                                        >
                                            <svg className="h-3.5 w-3.5 transform group-hover:-translate-x-0.5 transition-transform" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                                            Zurück
                                        </button>

                                        <h2 className="text-2xl font-bold tracking-tight text-zinc-900 mb-1">
                                            Anmelden
                                        </h2>
                                        <p className="text-xs text-zinc-400 font-medium mb-6">
                                            Zugang zu deinen privaten Diensten.
                                        </p>

                                        {loginSuccess ? (
                                            <div className="py-6 text-center">
                                                <div className="inline-flex h-10 w-10 items-center justify-center rounded-full bg-emerald-50 text-emerald-500 mb-3 border border-emerald-100 font-bold">
                                                    ✓
                                                </div>
                                                <p className="text-xs font-semibold text-zinc-800">Erfolgreich angemeldet</p>
                                                <p className="text-[10px] text-zinc-400 mt-1">Du wirst weitergeleitet...</p>
                                            </div>
                                        ) : (
                                            <form onSubmit={handleLoginSubmit} className="space-y-4 flex flex-col items-start">
                                                <div className="w-full">
                                                    <label className="block text-[10px] font-mono font-bold uppercase tracking-wider text-zinc-400 mb-1.5">
                                                        E-Mail-Adresse
                                                    </label>
                                                    <input 
                                                        type="email"
                                                        required
                                                        disabled={isSubmitting}
                                                        value={email}
                                                        onChange={(e) => setEmail(e.target.value)}
                                                        placeholder="name@beispiel.de"
                                                        className="w-full px-3.5 py-2.5 text-xs rounded-xl border border-zinc-200/80 bg-[#fdfdfd] text-zinc-900 placeholder-zinc-300 focus:outline-none focus:border-zinc-400 transition-all shadow-[inset_0_1px_2px_rgba(0,0,0,0.02)]"
                                                    />
                                                </div>

                                                <div className="relative w-full">
                                                    <label className="block text-[10px] font-mono font-bold uppercase tracking-wider text-zinc-400 mb-1.5">
                                                        Passwort
                                                    </label>
                                                    <div className="relative w-full">
                                                        <input 
                                                            type={showPassword ? "text" : "password"}
                                                            required
                                                            disabled={isSubmitting}
                                                            value={password}
                                                            onChange={(e) => setPassword(e.target.value)}
                                                            placeholder="••••••••"
                                                            className="w-full pl-3.5 pr-10 py-2.5 text-xs rounded-xl border border-zinc-200/80 bg-[#fdfdfd] text-zinc-900 placeholder-zinc-300 focus:outline-none focus:border-zinc-400 transition-all shadow-[inset_0_1px_2px_rgba(0,0,0,0.02)]"
                                                        />
                                                        <button
                                                            type="button"
                                                            onClick={() => setShowPassword(!showPassword)}
                                                            className="absolute right-3 top-1/2 -translate-y-1/2 text-zinc-400 hover:text-zinc-600 p-1"
                                                        >
                                                            {showPassword ? (
                                                                <svg className="h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>
                                                            ) : (
                                                                <svg className="h-3.5 w-3.5" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                                                            )}
                                                        </button>
                                                    </div>
                                                </div>

                                                <button 
                                                    type="submit"
                                                    disabled={isSubmitting}
                                                    className="relative inline-flex items-center justify-center px-6 py-2.5 rounded-xl bg-zinc-950 text-white text-xs font-semibold shadow-[0_2px_0_0_#09090b] hover:translate-y-[0.5px] hover:shadow-[0_1.5px_0_0_#09090b] active:translate-y-[2px] active:shadow-none disabled:opacity-50 transition-all duration-100 overflow-hidden"
                                                >
                                                    <span className="absolute inset-x-0 top-0 h-[1px] bg-white/20 pointer-events-none" />
                                                    <span className="relative z-10">{isSubmitting ? 'Verbinden...' : 'Anmelden'}</span>
                                                </button>
                                            </form>
                                        )}
                                    </div>
                                )}

                                {/* Status-Anzeige */}
                                <div className="mt-8 pt-5 border-t border-zinc-100 flex items-center justify-between">
                                    <span className="text-xs text-zinc-400 font-medium tracking-wide">
                                        Alle Services sind online
                                    </span>
                                    <div className="relative flex h-2 w-2 items-center justify-center mr-1">
                                        <span className="animate-pulse-ring absolute inline-flex h-4 w-4 rounded-full bg-emerald-400 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </main>

                    {/* Footer */}
                    <footer className="w-full text-[10px] text-zinc-400 font-mono tracking-widest relative z-10 text-center">
                        © {new Date().getFullYear()} benelabs
                    </footer>
                </div>
            );
        }

        // React 18 Mounting
        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
